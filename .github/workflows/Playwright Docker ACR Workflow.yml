name: Playwright Docker ACR Workflow

on:
  workflow_call:
    inputs:
      project-path:
        required: true
        type: string
        description: 'Path to the LiveServiceTesting project folder (e.g. MyApp.LiveServiceTesting)'
      image-name:
        required: true
        type: string
        description: 'ACR image name without registry (e.g. myapp-tests)'
      dockerfile-path:
        required: false
        type: string
        default: 'Dockerfile'
        description: 'Path to Dockerfile relative to repository root'
      image-tag:
        required: false
        type: string
        default: 'latest'
        description: '(Advanced) Docker image tag. Default is latest to minimize ACR storage.'
      include-sha-tag:
        required: false
        type: boolean
        default: false
        description: '(Advanced) Also tag image with commit SHA for traceability. Increases storage usage.'
    secrets:
      LIVESERVICETESTS_ACR_LOGIN_SERVER:
        required: false
        description: 'ACR login server (e.g. liveservicetests-xyz.azurecr.io). Optional - uses OIDC for SkylineCommunications repos, required for external repos.'
      LIVESERVICETESTS_ACR_USERNAME:
        required: false
        description: 'ACR username. Optional - uses OIDC for SkylineCommunications repos, required for external repos.'
      LIVESERVICETESTS_ACR_PASSWORD:
        required: false
        description: 'ACR password. Optional - uses OIDC for SkylineCommunications repos, required for external repos.'

jobs:
  validate_trigger:
    name: Validate Trigger
    runs-on: ubuntu-latest
    steps:
      - uses: SkylineCommunications/_ReusableWorkflows/.github/actions/guard-trigger@main

  check_oidc:
    name: Check OIDC
    needs: [validate_trigger]
    runs-on: ubuntu-latest
    outputs:
      cicd-client-id: ${{ steps.resolve-cicd.outputs.client-id }}
      cicd-tenant-id: ${{ steps.resolve-cicd.outputs.tenant-id }}
      cicd-subscription-id: ${{ steps.resolve-cicd.outputs.subscription-id }}
      cicd-use-oidc: ${{ steps.resolve-cicd.outputs.use-oidc }}
      liveservice-client-id: ${{ steps.resolve-liveservice.outputs.client-id }}
      liveservice-tenant-id: ${{ steps.resolve-liveservice.outputs.tenant-id }}
      liveservice-subscription-id: ${{ steps.resolve-liveservice.outputs.subscription-id }}
      liveservice-use-oidc: ${{ steps.resolve-liveservice.outputs.use-oidc }}
    steps:
      - name: Detect forked pull request
        id: detect-fork
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" && "$HEAD_REPOSITORY" != "$REPOSITORY" ]]; then
            echo "is-fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-fork=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve CI/CD OIDC parameters
        id: resolve-cicd
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/resolve-oidc@main
        with:
          repository-owner: ${{ github.repository_owner }}
          is-fork: ${{ steps.detect-fork.outputs.is-fork }}

      - name: Resolve LiveService OIDC parameters
        id: resolve-liveservice
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/resolve-oidc@main
        with:
          # LiveService OIDC identity for pushing test images to the LiveService ACR.
          # Federated credentials enforce that only workflows from _ReusableWorkflows can authenticate.
          client-id: 2ea5c4d5-d267-4b09-b3aa-e199386e0ea4
          tenant-id: 5f175691-8d1c-4932-b7c8-ce990839ac40
          subscription-id: 7886331d-2dce-4c81-9d63-10bb793a5408
          repository-owner: ${{ github.repository_owner }}
          is-fork: ${{ steps.detect-fork.outputs.is-fork }}

  publish:
    name: Publish test project
    needs: [check_oidc]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Azure Login (CI/CD)
        if: needs.check_oidc.outputs.cicd-use-oidc == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ needs.check_oidc.outputs.cicd-client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.cicd-tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.cicd-subscription-id }}

      - name: Load NuGet secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ needs.check_oidc.outputs.cicd-use-oidc }}
          secret-names: |
            azure-token
            skylinecommunications-github-token
            skylinecommunicationscore-github-token

      - name: Setup Skyline NuGet sources
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/setup-skyline-nuget-sources@main
        with:
          skylinecommunications-github-token: ${{ env.SKYLINECOMMUNICATIONS_GITHUB_TOKEN }}
          skylinecommunicationscore-github-token: ${{ env.SKYLINECOMMUNICATIONSCORE_GITHUB_TOKEN }}
          azure-token: ${{ env.AZURE_TOKEN }}

      - name: Publish test project
        env:
          PROJECT_PATH: ${{ inputs.project-path }}
        run: |
          dotnet publish "$PROJECT_PATH/$PROJECT_PATH.csproj" -c Release -o ./publish/tests

      - name: Upload published tests
        uses: actions/upload-artifact@v7
        with:
          name: playwright-tests-publish
          path: publish/tests
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  build-and-push:
    name: Build and Push
    needs: [check_oidc, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Validate image name
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
        run: |
          if [[ "$IMAGE_NAME" =~ [A-Z] ]]; then
            echo "::error::image-name must be lowercase for Azure Container Registry"
            echo "Got: $IMAGE_NAME"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download published tests
        uses: actions/download-artifact@v8
        with:
          name: playwright-tests-publish
          path: publish/tests

      - name: Azure Login (LiveService)
        if: needs.check_oidc.outputs.liveservice-use-oidc == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ needs.check_oidc.outputs.liveservice-client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.liveservice-tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.liveservice-subscription-id }}

      - name: Log in to ACR via OIDC
        if: needs.check_oidc.outputs.liveservice-use-oidc == 'true'
        run: az acr login --name liveservicetests --resource-group rg-live-service-tests
        shell: bash

      - name: Log in to ACR via explicit secrets
        if: needs.check_oidc.outputs.liveservice-use-oidc != 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.LIVESERVICETESTS_ACR_LOGIN_SERVER }}
          username: ${{ secrets.LIVESERVICETESTS_ACR_USERNAME }}
          password: ${{ secrets.LIVESERVICETESTS_ACR_PASSWORD }}

      - name: Set ACR login server
        id: set-acr
        env:
          USE_OIDC: ${{ needs.check_oidc.outputs.liveservice-use-oidc }}
          ACR_LOGIN_SERVER: ${{ secrets.LIVESERVICETESTS_ACR_LOGIN_SERVER }}
        run: |
          echo "registry-name=liveservicetests" >> "$GITHUB_OUTPUT"

          if [[ "$USE_OIDC" == "true" ]]; then
            echo "login-server=liveservicetests-cjcdb2cybdh4eyfu.azurecr.io" >> "$GITHUB_OUTPUT"
          else
            echo "login-server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile-path }}
          push: true
          build-args: |
            PROJECT_PATH=${{ inputs.project-path }}
          tags: |
            ${{ steps.set-acr.outputs.login-server }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
            ${{ inputs.include-sha-tag && format('{0}/{1}:{2}', steps.set-acr.outputs.login-server, inputs.image-name, github.sha) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Keep only current ACR manifest
        env:
          ACR_NAME: ${{ steps.set-acr.outputs.registry-name }}
          ACR_USERNAME: ${{ secrets.LIVESERVICETESTS_ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.LIVESERVICETESTS_ACR_PASSWORD }}
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          USE_OIDC: ${{ needs.check_oidc.outputs.liveservice-use-oidc }}
        run: |
          set -euo pipefail

          acr_auth_args=()
          if [[ "$USE_OIDC" != "true" ]]; then
            acr_auth_args+=(--username "$ACR_USERNAME" --password "$ACR_PASSWORD")
          fi

          manifests="$(az acr manifest list-metadata --registry "$ACR_NAME" --name "$IMAGE_NAME" --orderby time_desc --output json "${acr_auth_args[@]}")"
          keep_digest="$(jq -r --arg tag "$IMAGE_TAG" '.[] | select((.tags // []) | index($tag)) | .digest' <<< "$manifests" | head -n 1)"

          if [[ -z "$keep_digest" ]]; then
            echo "::error::Could not find pushed tag '$IMAGE_TAG' in ACR repository '$IMAGE_NAME'."
            exit 1
          fi

          jq -r --arg keep "$keep_digest" '.[] | select(.digest != $keep) | .digest' <<< "$manifests" |
          while IFS= read -r digest; do
            [[ -z "$digest" ]] && continue
            az acr repository delete --name "$ACR_NAME" --image "$IMAGE_NAME@$digest" --yes "${acr_auth_args[@]}"
          done
