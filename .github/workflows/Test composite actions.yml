name: Test composite actions

# Self-contained smoke tests for the composite actions in .github/actions/.
# Runs every composite that can be exercised without external secrets and
# asserts on its outputs / side effects. Composites that require live Azure
# Key Vault or live SonarCloud are covered by the downstream integration
# workflows, not here.

on:
  push:
    paths:
      - '.github/actions/**'
      - '.github/workflows/Test composite actions.yml'
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/workflows/Test composite actions.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  guard-trigger:
    name: guard-trigger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Invoke composite
        uses: ./.github/actions/guard-trigger
      - name: Confirm pass
        run: echo "guard-trigger passed on event '${{ github.event_name }}'"

  is-skyline-managed-org:
    name: is-skyline-managed-org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: SkylineCommunications is managed
        id: skylinecommunications
        uses: ./.github/actions/is-skyline-managed-org
        with:
          repository-owner: SkylineCommunications

      - name: SkylineCommunicationsCore is managed
        id: skylinecommunicationscore
        uses: ./.github/actions/is-skyline-managed-org
        with:
          repository-owner: SkylineCommunicationsCore

      - name: External owner is not managed
        id: external
        uses: ./.github/actions/is-skyline-managed-org
        with:
          repository-owner: SomeOtherOrg

      - name: Assert managed organization outputs
        env:
          SKYLINECOMMUNICATIONS: ${{ steps.skylinecommunications.outputs.is-skyline-managed }}
          SKYLINECOMMUNICATIONSCORE: ${{ steps.skylinecommunicationscore.outputs.is-skyline-managed }}
          EXTERNAL: ${{ steps.external.outputs.is-skyline-managed }}
        run: |
          test "$SKYLINECOMMUNICATIONS" = "true"
          test "$SKYLINECOMMUNICATIONSCORE" = "true"
          test "$EXTERNAL" = "false"

  resolve-oidc:
    name: resolve-oidc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Explicit inputs
        id: explicit
        uses: ./.github/actions/resolve-oidc
        with:
          client-id: 11111111-1111-1111-1111-111111111111
          tenant-id: 22222222-2222-2222-2222-222222222222
          subscription-id: 33333333-3333-3333-3333-333333333333
          repository-owner: NotSkyline

      - name: Assert explicit inputs were honored
        env:
          USE_OIDC: ${{ steps.explicit.outputs.use-oidc }}
          CLIENT_ID: ${{ steps.explicit.outputs.client-id }}
        run: |
          test "$USE_OIDC" = "true"
          test "$CLIENT_ID" = "11111111-1111-1111-1111-111111111111"

      - name: Skyline defaults
        id: skyline
        uses: ./.github/actions/resolve-oidc
        with:
          repository-owner: SkylineCommunications

      - name: Assert Skyline defaults
        env:
          USE_OIDC: ${{ steps.skyline.outputs.use-oidc }}
          CLIENT_ID: ${{ steps.skyline.outputs.client-id }}
        run: |
          test "$USE_OIDC" = "true"
          test "$CLIENT_ID" = "c50da9cc-ba14-4138-8595-a62d97ab0e53"

      - name: Skyline Core defaults
        id: skyline-core
        uses: ./.github/actions/resolve-oidc
        with:
          repository-owner: SkylineCommunicationsCore

      - name: Assert Skyline Core defaults
        env:
          USE_OIDC: ${{ steps.skyline-core.outputs.use-oidc }}
          CLIENT_ID: ${{ steps.skyline-core.outputs.client-id }}
        run: |
          test "$USE_OIDC" = "true"
          test "$CLIENT_ID" = "c50da9cc-ba14-4138-8595-a62d97ab0e53"

      - name: Forked pull request disables OIDC
        id: fork
        uses: ./.github/actions/resolve-oidc
        with:
          client-id: 11111111-1111-1111-1111-111111111111
          tenant-id: 22222222-2222-2222-2222-222222222222
          subscription-id: 33333333-3333-3333-3333-333333333333
          repository-owner: SkylineCommunications
          is-fork: 'true'

      - name: Assert forked pull request disables OIDC
        env:
          USE_OIDC: ${{ steps.fork.outputs.use-oidc }}
        run: test "$USE_OIDC" = "false"

      - name: External owner, no inputs
        id: external
        uses: ./.github/actions/resolve-oidc
        with:
          repository-owner: SomeOtherOrg

      - name: Assert OIDC disabled
        env:
          USE_OIDC: ${{ steps.external.outputs.use-oidc }}
        run: test "$USE_OIDC" = "false"

  load-secrets-overrides:
    name: load-secrets (overrides only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Invoke composite with overrides only
        uses: ./.github/actions/load-secrets
        with:
          use-oidc: 'false'
          overrides: |
            TEST_FOO=hello
            TEST_BAR=
            TEST_BAZ=world

      - name: Assert overrides
        run: |
          test "$TEST_FOO" = "hello"
          test "$TEST_BAZ" = "world"
          # Empty override must be skipped.
          test -z "${TEST_BAR:-}"

  setup-nuget-sources:
    name: setup-nuget-sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Invoke composite (no Skyline feeds, no azure token)
        uses: ./.github/actions/setup-nuget-sources
        with:
          repository-owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          include-skyline: 'false'

      - name: Assert GitHub source registered
        run: dotnet nuget list source | grep -q PrivateGitHubNugets

      - name: Re-invoke (idempotency check)
        uses: ./.github/actions/setup-nuget-sources
        with:
          repository-owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          include-skyline: 'false'

      - name: Assert still exactly one entry
        run: |
          count=$(dotnet nuget list source | grep -c PrivateGitHubNugets)
          test "$count" -eq 1

      - name: Invoke composite in public-only mode for Skyline Core
        uses: ./.github/actions/setup-nuget-sources
        with:
          repository-owner: SkylineCommunicationsCore
          github-token: ${{ secrets.GITHUB_TOKEN }}
          azure-token: fake-token
          public-only: 'true'

      - name: Assert public-only skips Azure sources
        run: |
          if dotnet nuget list source | grep -q PrivateAzureNuGets; then
            echo "Private Azure source should not be registered in public-only mode."
            exit 1
          fi

      - name: Invoke composite with Skyline Core auto feeds
        uses: ./.github/actions/setup-nuget-sources
        with:
          repository-owner: SkylineCommunicationsCore
          github-token: ${{ secrets.GITHUB_TOKEN }}
          azure-token: fake-token

      - name: Assert Skyline Core auto registers Azure sources
        run: |
          dotnet nuget list source | grep -q CloudNuGets
          dotnet nuget list source | grep -q PrivateAzureNuGets

  add-github-nuget-source:
    name: add-github-nuget-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Invoke composite
        uses: ./.github/actions/add-github-nuget-source
        with:
          organization: ExampleOrganization
          token: fake-token
          name: TestGitHubNuGets

      - name: Assert source registered
        run: dotnet nuget list source | grep -q TestGitHubNuGets

      - name: Re-invoke (idempotency check)
        uses: ./.github/actions/add-github-nuget-source
        with:
          organization: ExampleOrganization
          token: fake-token
          name: TestGitHubNuGets

      - name: Assert still exactly one entry
        run: |
          count=$(dotnet nuget list source | grep -c TestGitHubNuGets)
          test "$count" -eq 1

  add-azure-nuget-source:
    name: add-azure-nuget-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Invoke composite
        uses: ./.github/actions/add-azure-nuget-source
        with:
          url: https://pkgs.dev.azure.com/example/project/_packaging/feed/nuget/v3/index.json
          token: fake-token
          name: TestAzureNuGets

      - name: Assert source registered
        run: dotnet nuget list source | grep -q TestAzureNuGets

      - name: Re-invoke (idempotency check)
        uses: ./.github/actions/add-azure-nuget-source
        with:
          url: https://pkgs.dev.azure.com/example/project/_packaging/feed/nuget/v3/index.json
          token: fake-token
          name: TestAzureNuGets

      - name: Assert still exactly one entry
        run: |
          count=$(dotnet nuget list source | grep -c TestAzureNuGets)
          test "$count" -eq 1

  setup-skyline-nuget-sources:
    name: setup-skyline-nuget-sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Invoke composite
        uses: ./.github/actions/setup-skyline-nuget-sources
        with:
          skylinecommunications-github-token: fake-token
          skylinecommunicationscore-github-token: fake-token
          azure-token: fake-token

      - name: Assert sources registered
        run: |
          dotnet nuget list source | grep -q PrivateGitHubNugets
          dotnet nuget list source | grep -q SkylineCommunicationsCoreGitHubNugets
          dotnet nuget list source | grep -q CloudNuGets
          dotnet nuget list source | grep -q PrivateAzureNuGets

      - name: Re-invoke (idempotency check)
        uses: ./.github/actions/setup-skyline-nuget-sources
        with:
          skylinecommunications-github-token: fake-token
          skylinecommunicationscore-github-token: fake-token
          azure-token: fake-token

      - name: Assert still exactly one entry per source
        run: |
          test "$(dotnet nuget list source | grep -c PrivateGitHubNugets)" -eq 1
          test "$(dotnet nuget list source | grep -c SkylineCommunicationsCoreGitHubNugets)" -eq 1
          test "$(dotnet nuget list source | grep -c CloudNuGets)" -eq 1
          test "$(dotnet nuget list source | grep -c PrivateAzureNuGets)" -eq 1

  setup-skyline-nuget-sources-skip-empty-tokens:
    name: setup-skyline-nuget-sources (skip empty tokens)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Invoke composite with only Core GitHub token
        uses: ./.github/actions/setup-skyline-nuget-sources
        with:
          skylinecommunicationscore-github-token: fake-token

      - name: Assert only Core source registered
        run: |
          dotnet nuget list source | grep -q SkylineCommunicationsCoreGitHubNugets
          test "$(dotnet nuget list source | grep -c PrivateGitHubNugets)" -eq 0
          test "$(dotnet nuget list source | grep -c CloudNuGets)" -eq 0
          test "$(dotnet nuget list source | grep -c PrivateAzureNuGets)" -eq 0

  validate-inputs:
    name: validate-inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: All inputs set (should pass)
        uses: ./.github/actions/validate-inputs
        with:
          sonarcloud-project-name: my-project
          sonarcloud-token: sk_fake_token
          dataminer-token: dm_fake_token
          repository: ${{ github.repository }}
          check-sonar: 'true'
          check-dataminer: 'true'

      - name: Missing sonar name (should fail) — captured
        id: missing-name
        continue-on-error: true
        uses: ./.github/actions/validate-inputs
        with:
          sonarcloud-token: sk_fake_token
          repository: ${{ github.repository }}
          check-sonar: 'true'

      - name: Assert failure was detected
        run: |
          if [[ "${{ steps.missing-name.outcome }}" != "failure" ]]; then
            echo "Expected validate-inputs to fail when sonar name is missing"
            exit 1
          fi

  apply-catalog-identifiers:
    name: apply-catalog-identifiers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Stage fake manifest
        run: |
          mkdir -p Test/CatalogInformation
          cat > Test/CatalogInformation/manifest.yml <<'EOF'
          id: 00000000-0000-0000-0000-000000000000
          name: Test
          EOF

      - name: Invoke composite
        uses: ./.github/actions/apply-catalog-identifiers
        with:
          mappings: Test/CatalogInformation/manifest.yml=12345678-1234-1234-1234-123456789abc

      - name: Assert id rewritten
        run: |
          grep -q '^id: 12345678-1234-1234-1234-123456789abc$' Test/CatalogInformation/manifest.yml

      - name: Invoke with empty mappings (no-op)
        uses: ./.github/actions/apply-catalog-identifiers
        with:
          mappings: ''

  apply-source-code-url:
    name: apply-source-code-url
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Stage fake manifest with empty source_code_url
        run: |
          mkdir -p TestSrc/CatalogInformation
          cat > TestSrc/CatalogInformation/manifest.yml <<'EOF'
          id: 00000000-0000-0000-0000-000000000000
          source_code_url:
          name: Test
          EOF

      - name: Invoke composite
        uses: ./.github/actions/apply-source-code-url
        with:
          repository: ${{ github.repository }}

      - name: Assert source_code_url filled in
        env:
          REPO: ${{ github.repository }}
        run: |
          grep -q "source_code_url: 'https://github.com/$REPO'" TestSrc/CatalogInformation/manifest.yml

  detect-test-runner:
    name: detect-test-runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: No global.json (default vstest)
        id: default
        uses: ./.github/actions/detect-test-runner

      - name: Assert vstest
        env:
          MODE: ${{ steps.default.outputs.mode }}
        run: test "$MODE" = "vstest"

      - name: Stage global.json with MTP
        run: |
          cat > global.json <<'EOF'
          {
            "test": { "runner": "Microsoft.Testing.Platform" }
          }
          EOF

      - name: Detect MTP
        id: mtp
        uses: ./.github/actions/detect-test-runner

      - name: Assert mtp
        env:
          MODE: ${{ steps.mtp.outputs.mode }}
        run: test "$MODE" = "mtp"

  unit-tests:
    name: run-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Scaffold a minimal MSTest solution
        shell: bash
        run: |
          mkdir sample && cd sample
          dotnet new sln -n Sample
          dotnet new mstest -n Sample.Tests --framework net8.0
          dotnet sln add Sample.Tests/Sample.Tests.csproj
          # Force a VSTest layout: strip the MTP package reference the template adds.
          sed -i '/Microsoft\.Testing\.Platform/d' Sample.Tests/Sample.Tests.csproj
          dotnet build --configuration Release

      - name: Invoke run-unit-tests (vstest)
        uses: ./.github/actions/run-unit-tests
        with:
          solution-path: ${{ github.workspace }}/sample/Sample.slnx
          test-runner-mode: vstest

      - name: Assert TRX produced
        shell: bash
        run: |
          find sample -path '*/TestResults/*unitTestResults.trx' | grep -q .

      - name: Invoke run-unit-tests with invalid mode (must fail)
        id: bad-mode
        continue-on-error: true
        uses: ./.github/actions/run-unit-tests
        with:
          solution-path: ${{ github.workspace }}/sample/Sample.sln
          test-runner-mode: bogus

      - name: Assert invalid mode rejected
        env:
          OUTCOME: ${{ steps.bad-mode.outcome }}
        run: test "$OUTCOME" = "failure"

  update-global-json-sdks:
    name: update-global-json-sdks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The composite hard-codes the centrally-managed DataMiner SDK
      # version. Keep this in sync with $DATAMINER_SDK_VERSION in
      # .github/actions/update-global-json-sdks/action.yml.
      - name: Expected DataMiner SDK version
        id: expected
        shell: bash
        run: echo "version=2.5.4" >> "$GITHUB_OUTPUT"

      - name: No global.json (skip silently)
        uses: ./.github/actions/update-global-json-sdks

      - name: Stage global.json without msbuild-sdks
        shell: bash
        run: |
          cat > global.json <<'EOF'
          {
            "sdk": { "version": "8.0.100" }
          }
          EOF

      - name: Invoke composite (no msbuild-sdks, skip silently)
        uses: ./.github/actions/update-global-json-sdks

      - name: Assert global.json untouched
        shell: bash
        run: |
          grep -q '"version": "8.0.100"' global.json
          if grep -q 'msbuild-sdks' global.json; then
            echo "Expected no msbuild-sdks section"
            exit 1
          fi

      - name: Stage global.json with managed and unmanaged SDKs
        shell: bash
        run: |
          cat > global.json <<'EOF'
          {
            "sdk": { "version": "8.0.100" },
            "msbuild-sdks": {
              "Skyline.DataMiner.Sdk": "0.0.1",
              "Skyline.DataMiner.SomethingElse": "0.0.1",
              "Microsoft.Build.NoTargets": "3.7.0"
            }
          }
          EOF

      - name: Invoke composite (should bump DataMiner family)
        uses: ./.github/actions/update-global-json-sdks

      - name: Assert managed keys bumped, unmanaged untouched
        shell: bash
        env:
          EXPECTED: ${{ steps.expected.outputs.version }}
        run: |
          jq -e --arg v "$EXPECTED" '."msbuild-sdks"."Skyline.DataMiner.Sdk" == $v' global.json > /dev/null
          jq -e --arg v "$EXPECTED" '."msbuild-sdks"."Skyline.DataMiner.SomethingElse" == $v' global.json > /dev/null
          jq -e '."msbuild-sdks"."Microsoft.Build.NoTargets" == "3.7.0"' global.json > /dev/null

      - name: Re-invoke (idempotency check)
        uses: ./.github/actions/update-global-json-sdks

      - name: Assert still in expected state
        shell: bash
        env:
          EXPECTED: ${{ steps.expected.outputs.version }}
        run: |
          jq -e --arg v "$EXPECTED" '."msbuild-sdks"."Skyline.DataMiner.Sdk" == $v' global.json > /dev/null
          jq -e '."msbuild-sdks"."Microsoft.Build.NoTargets" == "3.7.0"' global.json > /dev/null

  sonarcloud-status:
    # Excluded from automatic runs: requires a live SonarCloud token. Run
    # manually via workflow_dispatch when SONAR_TOKEN + SONAR_NAME are set.
    name: sonarcloud-status (manual only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check prerequisites
        id: prereq
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_NAME: ${{ vars.SONAR_NAME }}
        run: |
          if [[ -z "$SONAR_TOKEN" || -z "$SONAR_NAME" ]]; then
            echo "Skipping: SONAR_TOKEN secret or SONAR_NAME variable is not configured."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Invoke composite
        if: steps.prereq.outputs.skip != 'true'
        uses: ./.github/actions/sonarcloud-status
        with:
          project-key: ${{ vars.SONAR_NAME }}
          branch: ${{ github.ref_name }}
          token: ${{ secrets.SONAR_TOKEN }}
          repository: ${{ github.repository }}

  references-parser:
    name: references-parser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run 16-case parser corpus
        shell: pwsh
        run: ./.github/actions/references-parser/test.ps1

      - name: Invoke composite smoke test
        id: references
        uses: ./.github/actions/references-parser
        with:
          pr-body: |
            Example change description.

            References: [RN12] [DCP35]
          actor: human
          labels-json: '["Change-Type:Major"]'

      - name: Assert composite outputs
        env:
          STATUS: ${{ steps.references.outputs.status }}
          CHANGE_TYPE: ${{ steps.references.outputs.change-type }}
          RNS: ${{ steps.references.outputs.rns }}
          TASKS: ${{ steps.references.outputs.tasks }}
        shell: pwsh
        run: |
          if ($env:STATUS -ne 'passed') { throw "Expected status passed, got '$env:STATUS'." }
          if ($env:CHANGE_TYPE -ne 'Major') { throw "Expected change-type Major, got '$env:CHANGE_TYPE'." }
          $rns = ConvertTo-Json -InputObject (ConvertFrom-Json -InputObject $env:RNS -NoEnumerate) -Compress -Depth 10
          $tasks = ConvertTo-Json -InputObject (ConvertFrom-Json -InputObject $env:TASKS -NoEnumerate) -Compress -Depth 10
          if ($rns -ne '["RN12"]') { throw "Unexpected RN output: $rns" }
          if ($tasks -ne '["DCP35"]') { throw "Unexpected tasks output: $tasks" }

  determine-version:
    name: determine-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run 18-case version corpus
        shell: pwsh
        run: ./.github/actions/determine-version/test.ps1

      - name: Tag build smoke test
        id: tag-build
        uses: ./.github/actions/determine-version
        with:
          ref-type: tag
          ref-name: 1.4.0-dev-myfeature.42
          run-number: 99

      - name: Branch build smoke test
        id: branch-build
        uses: ./.github/actions/determine-version
        with:
          ref-type: branch
          ref-name: main
          run-number: 70000

      - name: Assert composite outputs
        env:
          TAG_VERSION: ${{ steps.tag-build.outputs.version }}
          TAG_NUMERIC: ${{ steps.tag-build.outputs.numeric-version }}
          BRANCH_VERSION: ${{ steps.branch-build.outputs.version }}
          BRANCH_NUMERIC: ${{ steps.branch-build.outputs.numeric-version }}
        run: |
          test "$TAG_VERSION" = "1.4.0-dev-myfeature.42"
          test "$TAG_NUMERIC" = "1.4.0.99"
          test "$BRANCH_VERSION" = "0.0.70000"
          test "$BRANCH_NUMERIC" = "0.0.4465.4465"

  remove-wix-projects:
    name: remove-wix-projects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run offline test corpus
        shell: pwsh
        run: ./.github/actions/remove-wix-projects/test.ps1

      - name: Scaffold a solution with WiX projects
        id: scaffold
        run: |
          demo_dir="${RUNNER_TEMP}/wix-demo"
          mkdir -p "$demo_dir"
          cd "$demo_dir"
          dotnet new sln --name Demo
          solution_path=$(find "$demo_dir" -maxdepth 1 -name 'Demo.sln*' | head -n 1)
          dotnet new classlib -n PlainLib -o PlainLib
          dotnet sln "$solution_path" add PlainLib/PlainLib.csproj
          mkdir Installer
          echo '<Project Sdk="WixToolset.Sdk/6.0.0"></Project>' > Installer/Installer.wixproj
          dotnet sln "$solution_path" add Installer/Installer.wixproj
          echo "solution-path=$solution_path" >> "$GITHUB_OUTPUT"

      - name: Invoke composite smoke test
        id: remove
        uses: ./.github/actions/remove-wix-projects
        with:
          solution-path: ${{ steps.scaffold.outputs.solution-path }}

      - name: Assert removal
        env:
          REMOVED_COUNT: ${{ steps.remove.outputs.removed-count }}
          SOLUTION_PATH: ${{ steps.scaffold.outputs.solution-path }}
        run: |
          test "$REMOVED_COUNT" = "1"
          remaining=$(dotnet sln "$SOLUTION_PATH" list | tail -n +3)
          echo "$remaining" | grep -q 'PlainLib'
          if echo "$remaining" | grep -q 'wixproj'; then
            echo 'wixproj was not removed'
            exit 1
          fi

  quality-gate-summary:
    name: quality-gate-summary
    runs-on: ubuntu-latest
    # The action's sticky-comment step only runs on pull_request events and
    # needs `pull-requests: write`. We exercise the render + enforce paths
    # here; the comment step is covered by real PRs against caller repos.
    steps:
      - uses: actions/checkout@v7

      - name: All pass (unit tests only)
        id: all-pass
        uses: ./.github/actions/quality-gate-summary
        with:
          post-pr-comment: 'false'
          unit-tests-outcome: success

      - name: Assert passed
        env:
          STATUS: ${{ steps.all-pass.outputs.status }}
        run: test "$STATUS" = "passed"

      - name: Sonar link rendered when project name given
        id: sonar-link
        uses: ./.github/actions/quality-gate-summary
        with:
          post-pr-comment: 'false'
          unit-tests-outcome: success
          sonar-outcome: success
          sonar-status: PASSED
          sonarcloud-project-name: my-org_my-project

      - name: Assert sonar link in comment file
        run: grep -q 'https://sonarcloud.io/summary/new_code?id=my-org_my-project' "$GITHUB_WORKSPACE/quality-gate-comment.md"

      - name: Unit test failure fails the gate
        id: ut-fail
        continue-on-error: true
        uses: ./.github/actions/quality-gate-summary
        with:
          post-pr-comment: 'false'
          unit-tests-outcome: failure

      - name: Assert failure surfaced
        env:
          OUTCOME: ${{ steps.ut-fail.outcome }}
          STATUS: ${{ steps.ut-fail.outputs.status }}
        run: |
          test "$OUTCOME" = "failure"
          test "$STATUS" = "failed"

      - name: Sonar FAILED fails the gate
        id: sonar-fail
        continue-on-error: true
        uses: ./.github/actions/quality-gate-summary
        with:
          post-pr-comment: 'false'
          unit-tests-outcome: success
          sonar-outcome: success
          sonar-status: FAILED

      - name: Assert sonar failure surfaced
        env:
          OUTCOME: ${{ steps.sonar-fail.outcome }}
          STATUS: ${{ steps.sonar-fail.outputs.status }}
        run: |
          test "$OUTCOME" = "failure"
          test "$STATUS" = "failed"

      - name: Sonar WARN does not fail the gate
        id: sonar-warn
        uses: ./.github/actions/quality-gate-summary
        with:
          post-pr-comment: 'false'
          unit-tests-outcome: success
          sonar-outcome: success
          sonar-status: WARN

      - name: Assert warn passes
        env:
          STATUS: ${{ steps.sonar-warn.outputs.status }}
        run: test "$STATUS" = "passed"

      # The dependabot bypass branch reads ${{ github.actor }} resolved from the
      # workflow run context, which cannot be spoofed from a step. It is exercised
      # by real dependabot PRs against caller repos.

      - name: Stage validator state file (failed)
        run: |
          cat > validator-gate-state.json <<'EOF'
          {
            "status": "failed",
            "mode": "pr",
            "version": "1.2.3",
            "hasPrevious": true,
            "x": 1,
            "current":  { "critical": 1, "major": 2, "minor": 3 },
            "previous": { "critical": 0, "major": 1, "minor": 3 },
            "compareIssueCount": 4,
            "failures": ["New critical issue introduced", "Major regression detected"]
          }
          EOF

      - name: Validator state-file failure fails the gate
        id: validator-fail
        continue-on-error: true
        uses: ./.github/actions/quality-gate-summary
        with:
          post-pr-comment: 'false'
          unit-tests-outcome: success
          validator-outcome: failure
          validator-state-file: ${{ github.workspace }}/validator-gate-state.json

      - name: Assert validator failure surfaced
        env:
          OUTCOME: ${{ steps.validator-fail.outcome }}
          STATUS: ${{ steps.validator-fail.outputs.status }}
        run: |
          test "$OUTCOME" = "failure"
          test "$STATUS" = "failed"

      - name: Stage validator state file with missing optional fields
        run: |
          cat > validator-gate-state.json <<'EOF'
          {
            "status": "passed",
            "mode": "release",
            "version": "1.2.3",
            "hasPrevious": false,
            "x": 0,
            "current":  { "critical": 0, "major": 0, "minor": 0 },
            "previous": { "critical": 0, "major": 0, "minor": 0 },
            "compareIssueCount": 0
          }
          EOF

      - name: Validator state-file pass (no .failures key) does not crash
        id: validator-pass
        uses: ./.github/actions/quality-gate-summary
        with:
          post-pr-comment: 'false'
          unit-tests-outcome: success
          validator-outcome: success
          validator-state-file: ${{ github.workspace }}/validator-gate-state.json

      - name: Assert validator pass
        env:
          STATUS: ${{ steps.validator-pass.outputs.status }}
        run: test "$STATUS" = "passed"

      - name: Stage MCC state file (skipped on revision==1)
        run: |
          cat > mcc-gate-state.json <<'EOF'
          {
            "status": "skipped",
            "skipped": true,
            "skippedReason": "Major change checker skipped - current protocol version revision is 1.",
            "issueCount": 0,
            "version": "2.1.0.1",
            "previousVersion": "2.0.5.3",
            "failures": []
          }
          EOF

      - name: MCC skipped does not fail the gate
        id: mcc-skipped
        uses: ./.github/actions/quality-gate-summary
        with:
          post-pr-comment: 'false'
          unit-tests-outcome: success
          major-change-checker-outcome: success
          major-change-checker-state-file: ${{ github.workspace }}/mcc-gate-state.json

      - name: Assert MCC skipped passes
        env:
          STATUS: ${{ steps.mcc-skipped.outputs.status }}
        run: test "$STATUS" = "passed"

      - name: Stage MCC state file (failed)
        run: |
          cat > mcc-gate-state.json <<'EOF'
          {
            "status": "failed",
            "skipped": false,
            "skippedReason": "",
            "issueCount": 3,
            "version": "2.1.0.5",
            "previousVersion": "2.1.0.4",
            "failures": ["Major Change Checker reported 3 issue(s)."]
          }
          EOF

      - name: MCC failure fails the gate
        id: mcc-fail
        continue-on-error: true
        uses: ./.github/actions/quality-gate-summary
        with:
          post-pr-comment: 'false'
          unit-tests-outcome: success
          major-change-checker-outcome: failure
          major-change-checker-state-file: ${{ github.workspace }}/mcc-gate-state.json

      - name: Assert MCC failure surfaced
        env:
          OUTCOME: ${{ steps.mcc-fail.outcome }}
          STATUS: ${{ steps.mcc-fail.outputs.status }}
        run: |
          test "$OUTCOME" = "failure"
          test "$STATUS" = "failed"
