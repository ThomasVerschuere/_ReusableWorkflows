name: Connector Master Workflow

# Needed for OIDC, checkout, git-push, ...
permissions: write-all

on:
  workflow_call:
    outputs:
      quality_gate:
        description: "Results from Skyline Quality Gate."
        value: ${{ jobs.CI_SDK.outputs.quality_gate }}${{ jobs.CI_Legacy.outputs.quality_gate }}

    inputs:
      # No need to specify these as the workflow can access github.* (https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/accessing-contextual-information-about-workflow-runs#github-context)
      # When a reusable workflow is triggered by a caller workflow, the github context is always associated with the caller workflow.
      referenceName:
        required: false
        type: string
      runNumber:
        required: false
        type: string
      referenceType:
        required: false
        type: string
      repository:
        required: false
        type: string
      owner:
        required: false
        type: string

      # Optional OIDC inputs in case outside SkylineCommunications organization
      oidc-client-id:
        required: false
        type: string
      oidc-tenant-id:
        required: false
        type: string
      oidc-subscription-id:
        required: false
        type: string

      sonarCloudProjectName:
        required: false
        type: string
      debug:
        required: false
        type: boolean

    secrets:
      api-key:
        required: false
      sonarCloudToken:
        required: false
      azureToken:
        required: false

jobs:

  validate_trigger:
    name: Validate Trigger
    runs-on: ubuntu-latest
    steps:
      - uses: SkylineCommunications/_ReusableWorkflows/.github/actions/guard-trigger@main

  check_deprecated_item:
    name: Check deprecated items
    needs: [validate_trigger]
    runs-on: ubuntu-latest
    steps:
      - name: Check if obsolete inputs are still used
        run: |
          input_names=("referenceName" "runNumber" "referenceType" "repository" "owner")

          for input_name in "${input_names[@]}"; do
            value="${{ inputs.referenceName }}"  # placeholder, see note below
            case $input_name in
              referenceName) value="${{ inputs.referenceName }}" ;;
              runNumber) value="${{ inputs.runNumber }}" ;;
              referenceType) value="${{ inputs.referenceType }}" ;;
              repository) value="${{ inputs.repository }}" ;;
              owner) value="${{ inputs.owner }}" ;;
            esac

            if [ -n "$value" ]; then
              echo "::warning::The input '$input_name' can be safely removed as this is not required anymore."
            fi
          done

      - name: Check if obsolete secrets are still used
        if: github.repository_owner == 'SkylineCommunications'
        run: |
          secret_names=("azureToken" "sonarCloudToken")

          for secret_name in "${secret_names[@]}"; do
            value="${{ secrets.sonarCloudToken }}"  # placeholder, see note below
            case $secret_name in
              sonarCloudToken) value="${{ secrets.sonarCloudToken }}" ;;
              azureToken) value="${{ secrets.azureToken }}" ;;
            esac

            if [ -n "$value" ]; then
              echo "::warning::The secret '$secret_name' can be safely removed as this is not required anymore."
            fi
          done

  check_oidc:
    name: Check OIDC
    runs-on: ubuntu-latest
    outputs:
      client-id: ${{ steps.resolve.outputs.client-id }}
      tenant-id: ${{ steps.resolve.outputs.tenant-id }}
      subscription-id: ${{ steps.resolve.outputs.subscription-id }}
      use-oidc: ${{ steps.resolve.outputs.use-oidc }}
      is-skyline-managed: ${{ steps.resolve.outputs.is-skyline-managed }}
    steps:
      - id: resolve
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/resolve-oidc@main
        with:
          client-id: ${{ inputs.oidc-client-id }}
          tenant-id: ${{ inputs.oidc-tenant-id }}
          subscription-id: ${{ inputs.oidc-subscription-id }}
          repository-owner: ${{ github.repository_owner }}

  check_solution_type:
      name: Check Project Types
      runs-on: ubuntu-latest
      outputs:
        isSdk: ${{ steps.checker.outputs.isSdk }}

      steps:
        - name: Enable long paths
          run: git config --global core.longpaths true

        - uses: actions/checkout@v7

        - name: Install SDKChecker
          run: dotnet tool install Skyline.DataMiner.CICD.Tools.SDKChecker --global --version 2.*

        - name: Run SDKChecker
          id: checker
          run: |
            output="$(SDKChecker --workspace "${{ github.workspace }}" --repositoryName "${{ github.repositoryUrl }}" --repositoryBranch "${{ github.ref_name }}")"
            if [ -z "$output" ]; then
              echo "isSdk=true" >> "$GITHUB_OUTPUT"
            else
              echo "isSdk=false" >> "$GITHUB_OUTPUT"
            fi
            echo "Output: $output"

  CI_Legacy:
    uses: ./.github/workflows/Connector Master Legacy Workflow.yml
    needs: [check_solution_type, check_oidc]
    if: needs.check_solution_type.outputs.isSdk == 'false'
    with:
      oidc-client-id: ${{ needs.check_oidc.outputs.client-id }}
      oidc-tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
      oidc-subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}
      use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}

      sonarCloudProjectName: ${{ inputs.sonarCloudProjectName }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  CI_SDK:
    uses: ./.github/workflows/Connector Master SDK Workflow.yml
    needs: [check_solution_type, check_oidc]
    if: needs.check_solution_type.outputs.isSdk == 'true'
    with:
      oidc-client-id: ${{ needs.check_oidc.outputs.client-id }}
      oidc-tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
      oidc-subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}
      use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}

      sonarCloudProjectName: ${{ inputs.sonarCloudProjectName }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  # Keep the enterprise custom property `Workflow-Repo-Type` in sync: a connector repo is always
  # `Connector`. Runs only on the repository's default branch (feature branches / PRs / tags never
  # flip the governance type) and only for Skyline-managed repos where OIDC (and thus the Key Vault
  # token) is available. The write identity is the org-owner classic PAT `reusable-workflows-token`;
  # the default GITHUB_TOKEN cannot write it.
  set_repo_type:
    name: Set Repo Type
    needs: [check_oidc]
    if: >-
      github.ref_name == github.event.repository.default_branch &&
      needs.check_oidc.outputs.is-skyline-managed == 'true' &&
      needs.check_oidc.outputs.use-oidc == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Load secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}
          secret-names: |
            reusable-workflows-token

      - name: Set repo type
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/set-repo-type@main
        with:
          repo-types: Connector
          token: ${{ env.REUSABLE_WORKFLOWS_TOKEN }}
