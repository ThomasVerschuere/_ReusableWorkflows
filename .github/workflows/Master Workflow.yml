name: Main workflow

permissions:
  contents: read
  id-token: write
  packages: write
  actions: read

on:
  workflow_call:
    inputs:
      oidc-client-id:
        required: false
        type: string
      oidc-tenant-id:
        required: false
        type: string
      oidc-subscription-id:
        required: false
        type: string

      sonarcloud-project-name:
        required: false
        type: string

      configuration:
        required: false
        type: string
        default: 'Release'

      solution-filter-name:
        required: false
        type: string

      debug:
        required: false
        type: boolean
        default: false

      runs-on:
        required: false
        type: string
        default: 'ubuntu-latest'

      # One or more lines with <relative path to manifest.yml>=<catalog identifier>.
      # Example:
      #   PackageA.Install/CatalogInformation/manifest.yml=11111111-1111-1111-1111-111111111111
      #   PackageB.Install/CatalogInformation/manifest.yml=22222222-2222-2222-2222-222222222222
      override-catalog-identifiers:
        required: false
        type: string

      # NuGet push destination URL. Defaults to the GitHub Packages registry of the calling repository's owner.
      nuget-push-source:
        required: false
        type: string

      # Comma-separated list of project names to `dotnet publish` for Linux and package as `.deb`.
      # Empty ⇒ the Ubuntu packaging and `.deb` release flows are skipped.
      dxm-projects-ubuntu:
        required: false
        type: string

    secrets:
      SONAR_TOKEN:
        required: false
      DATAMINER_TOKEN:
        required: false
      AZURE_TOKEN:
        required: false
      OVERRIDE_CATALOG_DOWNLOAD_TOKEN:
        required: false
      NUGET_API_KEY:
        required: false

env:
  VERSION_APPPACKAGEINSTALLER: '4.0.0'

jobs:

  validate_trigger:
    name: Validate Trigger
    runs-on: ubuntu-latest
    steps:
      - uses: SkylineCommunications/_ReusableWorkflows/.github/actions/guard-trigger@main

  check_oidc:
    name: Check OIDC
    needs: [validate_trigger]
    runs-on: ubuntu-latest
    outputs:
      client-id: ${{ steps.resolve.outputs.client-id }}
      tenant-id: ${{ steps.resolve.outputs.tenant-id }}
      subscription-id: ${{ steps.resolve.outputs.subscription-id }}
      use-oidc: ${{ steps.resolve.outputs.use-oidc }}
      is-skyline-managed: ${{ steps.resolve.outputs.is-skyline-managed }}
      is-fork: ${{ steps.detect-fork.outputs.is-fork }}
    steps:
      - name: Detect forked pull request
        id: detect-fork
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" && "$HEAD_REPOSITORY" != "$REPOSITORY" ]]; then
            echo "is-fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-fork=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - id: resolve
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/resolve-oidc@main
        with:
          client-id: ${{ inputs.oidc-client-id }}
          tenant-id: ${{ inputs.oidc-tenant-id }}
          subscription-id: ${{ inputs.oidc-subscription-id }}
          repository-owner: ${{ github.repository_owner }}
          is-fork: ${{ steps.detect-fork.outputs.is-fork }}

  discover_projects:
    name: Discover Project Types
    needs: [validate_trigger]
    runs-on: ubuntu-latest
    outputs:
      has-dataminer-projects: ${{ steps.detect-projects.outputs.has-dataminer-projects }}
      has-wix-projects: ${{ steps.detect-projects.outputs.has-wix-projects }}
      has-nuget-projects: ${{ steps.detect-projects.outputs.has-nuget-projects }}
      has-ubuntu-dxm: ${{ inputs.dxm-projects-ubuntu != '' }}
      solution-path: ${{ steps.find-solution-file.outputs.path }}
    steps:
      - uses: actions/checkout@v7

      - name: Find solution file
        id: find-solution-file
        env:
          SOLUTION_FILTER_NAME: ${{ inputs.solution-filter-name }}
        run: |
          if [[ -z "$SOLUTION_FILTER_NAME" ]]; then
            results=$(find . -type f \( -name '*.sln' -o -name '*.slnx' \))
          else
            results=$(find . -type f -name "$SOLUTION_FILTER_NAME")
          fi

          count=$(echo "$results" | grep -c .)
          if [ "$count" -eq 0 ]; then
            echo "Error: No solution file found."
            exit 1
          elif [ "$count" -gt 1 ]; then
            echo "Error: Multiple solution files found:"
            echo "$results"
            echo "Please specify a solution-filter-name input to disambiguate."
            exit 1
          fi

          echo "path=$results" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect projects with specific properties
        id: detect-projects
        env:
          SOLUTION_PATH: ${{ steps.find-solution-file.outputs.path }}
        run: |
          $solutionPath = "$env:SOLUTION_PATH"
          $solutionDir  = Split-Path $solutionPath -Parent
          $hasDataminerProjects = $false
          $hasWixProjects = $false
          $hasNugetProjects = $false

          # Use dotnet sln list to enumerate projects in the solution (skip 2-line header)
          $projectPaths = dotnet sln "$solutionPath" list | Select-Object -Skip 2 | Where-Object { $_ -ne '' }

          foreach ($relativePath in $projectPaths) {
            $absolutePath = Join-Path $solutionDir ($relativePath -replace '\\', '/')
            if (-not (Test-Path $absolutePath)) { continue }

            # Check for WiX installer projects (by extension)
            if ($relativePath -like '*.wixproj') {
              Write-Output "Found WiX project: $relativePath"
              $hasWixProjects = $true
              if ($hasDataminerProjects) { break }
              continue
            }

            [xml]$content = Get-Content $absolutePath

            # Check for Skyline.DataMiner.Sdk projects (based on DataMinerType property)
            if (-not $hasDataminerProjects -and $content.SelectNodes("//DataMinerType").Count -gt 0) {
              Write-Output "Found DataMiner project: $relativePath"
              $hasDataminerProjects = $true
            }

            # Check for WiX custom-action projects (based on WixToolset.Dtf package references)
            if (-not $hasWixProjects -and $content.SelectNodes("//PackageReference[@Include='WixToolset.Dtf.CustomAction' or @Include='WixToolset.Dtf.WindowsInstaller']").Count -gt 0) {
              Write-Output "Found WiX-related project: $relativePath"
              $hasWixProjects = $true
            }

            # Check for NuGet-publishing projects: those that opt into packaging
            # (GeneratePackageOnBuild / IsPackable = true)
            if (-not $hasNugetProjects) {
              $generatePackage = $content.SelectNodes("//GeneratePackageOnBuild") | Where-Object { "$($_.InnerText)".Trim().ToLowerInvariant() -eq 'true' }
              $isPackable = $content.SelectNodes("//IsPackable") | Where-Object { "$($_.InnerText)".Trim().ToLowerInvariant() -eq 'true' }
              if ($generatePackage -or $isPackable) {
                Write-Output "Found NuGet-publishing project: $relativePath"
                $hasNugetProjects = $true
              }
            }
          }

          echo "has-dataminer-projects=$($hasDataminerProjects.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          echo "has-wix-projects=$($hasWixProjects.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          echo "has-nuget-projects=$($hasNugetProjects.ToString().ToLower())" >> $env:GITHUB_OUTPUT
        shell: pwsh

  determine_version:
    name: Determine Version
    needs: [validate_trigger]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.determine-version.outputs.version }}
      numeric-version: ${{ steps.determine-version.outputs.numeric-version }}
    steps:
      - name: Determine version
        id: determine-version
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/determine-version@main
        with:
          ref-type: ${{ github.ref_type }}
          ref-name: ${{ github.ref_name }}
          run-number: ${{ github.run_number }}

  # Keep the enterprise custom property `Workflow-Repo-Type` in sync with what the repo builds, so
  # the conditional governance rulesets stay correct. Runs only on the repository's default branch
  # (feature branches / PRs / tags never flip the governance type) and only for Skyline-managed,
  # non-fork repos where OIDC (and thus the Key Vault token) is available. The write identity is the
  # org-owner classic PAT `reusable-workflows-token`; the default GITHUB_TOKEN cannot write it.
  set_repo_type:
    name: Set Repo Type
    needs: [check_oidc, discover_projects]
    if: >-
      github.ref_name == github.event.repository.default_branch &&
      needs.check_oidc.outputs.is-skyline-managed == 'true' &&
      needs.check_oidc.outputs.is-fork != 'true' &&
      needs.check_oidc.outputs.use-oidc == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Load secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}
          secret-names: |
            reusable-workflows-token

      - name: Compute repo types
        id: map
        env:
          HAS_DXM: ${{ needs.discover_projects.outputs.has-wix-projects == 'true' || needs.discover_projects.outputs.has-ubuntu-dxm == 'true' }}
          HAS_APPPACKAGE: ${{ needs.discover_projects.outputs.has-dataminer-projects }}
          HAS_NUGET: ${{ needs.discover_projects.outputs.has-nuget-projects }}
        run: |
          types=()
          [[ "$HAS_DXM" == "true" ]] && types+=("DxM")
          [[ "$HAS_APPPACKAGE" == "true" ]] && types+=("AppPackage")
          [[ "$HAS_NUGET" == "true" ]] && types+=("NuGet")
          IFS=','
          echo "repo-types=${types[*]}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Set repo type
        if: steps.map.outputs.repo-types != ''
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/set-repo-type@main
        with:
          repo-types: ${{ steps.map.outputs.repo-types }}
          token: ${{ env.REUSABLE_WORKFLOWS_TOKEN }}

  ci:
    name: CI
    needs: [check_oidc, discover_projects, determine_version]
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      id-token: write
      packages: write
      actions: read
      pull-requests: write # required by quality-gate-summary to post the sticky PR comment
    env:
      # DataMiner compile constants, exposed as an ENVIRONMENT variable instead of a
      # -p:DefineConstants global property on purpose: a global property overrides the
      # DefineConstants a project sets for itself, which breaks WiX projects (they use
      # DefineConstants for preprocessor variables, e.g. ProductVersion=$(ProductVersion)).
      # An environment variable is the lowest-precedence source: SDK-style C# projects
      # append to it ($(DefineConstants);TRACE;NETx_y) so they still get the constants,
      # while a project that sets its own DefineConstants keeps its value.
      DefineConstants: DCFv1;DBInfo;ALARM_SQUASHING
    defaults:
      run:
        shell: bash
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: needs.check_oidc.outputs.use-oidc == 'true'
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Load secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}
          secret-names: |
            azure-token
            sonar-token
            skylinecommunications-github-token
            skylinecommunicationscore-github-token
            ${{ needs.discover_projects.outputs.has-dataminer-projects == 'true' && 'dataminer-token' || '' }}
          overrides: |
            AZURE_TOKEN=${{ secrets.AZURE_TOKEN }}
            SONAR_TOKEN=${{ secrets.SONAR_TOKEN }}
            DATAMINER_TOKEN=${{ secrets.DATAMINER_TOKEN }}

      - name: Validate inputs
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/validate-inputs@main
        with:
          sonarcloud-project-name: ${{ inputs.sonarcloud-project-name }}
          sonarcloud-token: ${{ env.SONAR_TOKEN }}
          dataminer-token: ${{ env.DATAMINER_TOKEN }}
          repository: ${{ github.repository }}
          has-dataminer-projects: ${{ needs.discover_projects.outputs.has-dataminer-projects }}
          check-sonar: ${{ github.actor != 'dependabot[bot]' && inputs.sonarcloud-project-name != '' && needs.check_oidc.outputs.is-fork != 'true' }}
          check-dataminer: ${{ github.ref_type == 'tag' && needs.discover_projects.outputs.has-dataminer-projects == 'true' }}

      - name: Enable long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache and Install Mono
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: mono-complete
      
      # Skyline-managed repos register BOTH organizations' GitHub Packages feeds
      # (cross-org restore needs the Key Vault tokens - the default GITHUB_TOKEN only
      # reads its own org) + the Skyline Azure feeds. Non-Skyline owners and fork PRs
      # (no Key Vault) fall back to just their own organization's feed.
      - name: Setup Skyline NuGet sources
        if: needs.check_oidc.outputs.is-skyline-managed == 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/setup-skyline-nuget-sources@main
        with:
          skylinecommunications-github-token: ${{ env.SKYLINECOMMUNICATIONS_GITHUB_TOKEN }}
          skylinecommunicationscore-github-token: ${{ env.SKYLINECOMMUNICATIONSCORE_GITHUB_TOKEN }}
          azure-token: ${{ env.AZURE_TOKEN }}

      - name: Setup local GitHub NuGet source
        if: needs.check_oidc.outputs.is-skyline-managed != 'true' || needs.check_oidc.outputs.is-fork == 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/add-github-nuget-source@main
        with:
          organization: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install .NET tools
        env:
          GH_ACTOR: ${{ github.actor }}
          HAS_DM_PROJECTS: ${{ needs.discover_projects.outputs.has-dataminer-projects }}
          SONAR_PROJECT_NAME: ${{ inputs.sonarcloud-project-name }}
          IS_FORK: ${{ needs.check_oidc.outputs.is-fork }}
        run: |
          if [[ "$GH_ACTOR" != "dependabot[bot]" ]] && [[ -n "$SONAR_PROJECT_NAME" ]] && [[ "$IS_FORK" != "true" ]]; then
            dotnet tool install dotnet-sonarscanner --global
          fi

          dotnet tool install -g Skyline.DataMiner.CICD.Tools.NuGetValidateSkylineSpecifications --version 3.*

          if [[ "$HAS_DM_PROJECTS" == "true" ]]; then
            dotnet tool install Skyline.DataMiner.CICD.Tools.NuGetChangeVersion --global --version 3.*
          fi
        shell: bash

      # ──────────────────────────────────────────────────────────────
      # A. DataMiner-specific setup
      # ──────────────────────────────────────────────────────────────
      - name: Require dxm-id-file.json for DxM repositories
        if: needs.discover_projects.outputs.has-wix-projects == 'true' || needs.discover_projects.outputs.has-ubuntu-dxm == 'true'
        run: |
          if [ ! -f "dxm-id-file.json" ]; then
            echo "::error::dxm-id-file.json is required for DxM repositories but was not found at the repository root."
            exit 1
          fi

      - name: Remove WiX projects (not buildable in cross-platform CI)
        if: needs.discover_projects.outputs.has-wix-projects == 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/remove-wix-projects@main
        with:
          solution-path: ${{ needs.discover_projects.outputs.solution-path }}

      - name: Update msbuild-sdks in global.json
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/update-global-json-sdks@main

      - name: Update Skyline.DataMiner.Core.AppPackageInstaller
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
        run: NuGetChangeVersion --solution-filepath "$SOLUTION_PATH" --nuget-name Skyline.DataMiner.Core.AppPackageInstaller --nuget-version $VERSION_APPPACKAGEINSTALLER

      - name: Validate NuGet projects
        if: github.actor != 'dependabot[bot]'
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          IS_SKYLINE_MANAGED: ${{ needs.check_oidc.outputs.is-skyline-managed }}
        run: |
          $minimal = "$env:IS_SKYLINE_MANAGED" -ne "true"
          NuGetValidateSkylineSpecifications --solution-filepath "$env:SOLUTION_PATH" --minimal $minimal
        shell: pwsh

      - name: Apply catalog identifiers
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/apply-catalog-identifiers@main
        with:
          mappings: ${{ inputs.override-catalog-identifiers }}

      - name: Apply source_code_url to manifest
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/apply-source-code-url@main
        with:
          repository: ${{ github.repository }}

      # ──────────────────────────────────────────────────────────────
      # B. SonarCloud analysis (skipped for Dependabot)
      # ──────────────────────────────────────────────────────────────

      - name: Prepare SonarCloud Variables
        if: github.actor != 'dependabot[bot]' && inputs.sonarcloud-project-name != '' && needs.check_oidc.outputs.is-fork != 'true'
        id: prepSonarCloudVar
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "lowerCaseOwner=${OWNER,,}" >> "$GITHUB_ENV"

      - name: Get SonarCloud Status
        if: github.actor != 'dependabot[bot]' && inputs.sonarcloud-project-name != '' && needs.check_oidc.outputs.is-fork != 'true'
        id: get-sonarcloud-status
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/sonarcloud-status@main
        with:
          project-key: ${{ inputs.sonarcloud-project-name }}
          branch: ${{ github.ref_name }}
          token: ${{ env.SONAR_TOKEN }}
          repository: ${{ github.repository }}

      - name: Trigger Initial Analysis
        if: github.actor != 'dependabot[bot]' && inputs.sonarcloud-project-name != '' && needs.check_oidc.outputs.is-fork != 'true' && steps.get-sonarcloud-status.outputs.needs-initial-analysis == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_PROJECT_NAME: ${{ inputs.sonarcloud-project-name }}
          BRANCH_NAME: ${{ github.ref_name }}
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          CONFIGURATION: ${{ inputs.configuration }}
          MSYS_NO_PATHCONV: '1'
        run: |
            dotnet sonarscanner begin \
              /k:"$SONAR_PROJECT_NAME" \
              /o:"$lowerCaseOwner" \
              /d:sonar.token="$SONAR_TOKEN" \
              /d:sonar.host.url="https://sonarcloud.io" \
              /d:sonar.exclusions="**/*.yml,**/*.xml" \
              /d:sonar.branch.name="$BRANCH_NAME"
            dotnet build "$SOLUTION_PATH" \
              -p:GenerateDataMinerPackage=false \
              -p:GeneratePackageOnBuild=false \
              --configuration "$CONFIGURATION" \
              -p:WarningLevel=0
            dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
        continue-on-error: true

      - name: Start Analysis
        if: github.actor != 'dependabot[bot]' && inputs.sonarcloud-project-name != '' && needs.check_oidc.outputs.is-fork != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_PROJECT_NAME: ${{ inputs.sonarcloud-project-name }}
          BRANCH_NAME: ${{ github.ref_name }}
          MSYS_NO_PATHCONV: '1'
        run: |
            dotnet sonarscanner begin \
              /k:"$SONAR_PROJECT_NAME" \
              /o:"$lowerCaseOwner" \
              /d:sonar.token="$SONAR_TOKEN" \
              /d:sonar.host.url="https://sonarcloud.io" \
              /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
              /d:sonar.cs.vscoveragexml.reportsPaths="**/TestResults/**/coverage.xml" \
              /d:sonar.cs.vstest.reportsPaths="**/TestResults/**.trx" \
              /d:sonar.exclusions="**/*.yml,**/*.xml" \
              /d:sonar.branch.name="$BRANCH_NAME"
        continue-on-error: true

      # ──────────────────────────────────────────────────────────────
      # C. Build
      # ──────────────────────────────────────────────────────────────

      - name: Build
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          VERSION: ${{ needs.determine_version.outputs.version }}
          CONFIGURATION: ${{ inputs.configuration }}
          DEBUG_FLAG: ${{ inputs.debug }}
        run: |
          # Validation-only build: packaging is off — the shippable artifacts (NuGet,
          # .dmapp, MSI, .deb) are produced and signed by the tag-only packaging jobs.
          # This also keeps the catalog download token out of fork CI (no secrets there).
          # DefineConstants comes from the job-level env var (see the job's env block).
          dotnet build "$SOLUTION_PATH" \
            -p:Version="$VERSION" \
            -p:PackageVersion="$VERSION" \
            --configuration "$CONFIGURATION" \
            -p:SkylineDataMinerSdkDebug="$DEBUG_FLAG" \
            -p:GeneratePackageOnBuild=false \
            -p:GenerateDataMinerPackage=false

      # ──────────────────────────────────────────────────────────────
      # D. Test & Quality Gate
      # ──────────────────────────────────────────────────────────────
      - name: Unit Tests
        id: unit-tests
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/unit-tests@main
        with:
          solution-path: ${{ needs.discover_projects.outputs.solution-path }}
          configuration: ${{ inputs.configuration }}

      - name: Stop Analysis
        if: github.actor != 'dependabot[bot]' && inputs.sonarcloud-project-name != '' && needs.check_oidc.outputs.is-fork != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MSYS_NO_PATHCONV: '1'
        run: |
            dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
        continue-on-error: true

      - name: SonarCloud Quality Gate check
        if: github.actor != 'dependabot[bot]' && inputs.sonarcloud-project-name != '' && needs.check_oidc.outputs.is-fork != 'true'
        id: sonarcloud-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@8e9b0ca0a7273d6f16986388d98393efdfcf56fd
        with:
          scanMetadataReportFile: .sonarqube/out/.sonar/report-task.txt
        continue-on-error: true
        timeout-minutes: 5

      - name: Quality Gate
        id: quality-step
        if: always()
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/quality-gate-summary@main
        with:
          unit-tests-outcome: ${{ steps.unit-tests.outcome }}
          sonar-outcome: ${{ inputs.sonarcloud-project-name != '' && needs.check_oidc.outputs.is-fork != 'true' && steps.sonarcloud-quality-gate-check.outcome || '' }}
          sonar-status: ${{ inputs.sonarcloud-project-name != '' && needs.check_oidc.outputs.is-fork != 'true' && steps.sonarcloud-quality-gate-check.outputs.quality-gate-status || '' }}
          sonarcloud-project-name: ${{ github.actor != 'dependabot[bot]' && needs.check_oidc.outputs.is-fork != 'true' && inputs.sonarcloud-project-name || '' }}
          dependabot-bypass: ${{ github.actor == 'dependabot[bot]' }}

  # ════════════════════════════════════════════════════════════════
  # Ubuntu packaging: one .deb per project in dxm-projects-ubuntu. Runs on every
  # ref except fork PRs (no secrets) and Dependabot; the .deb release stays tag-only.
  # ════════════════════════════════════════════════════════════════

  package_ubuntu:
    name: Package Ubuntu Services
    runs-on: ubuntu-latest
    if: needs.check_oidc.outputs.is-fork != 'true' && github.actor != 'dependabot[bot]' && needs.discover_projects.outputs.has-ubuntu-dxm == 'true'
    needs: [ci, check_oidc, discover_projects, determine_version]
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: needs.check_oidc.outputs.use-oidc == 'true'
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Load secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}
          secret-names: |
            azure-token
            skylinecommunications-github-token
            skylinecommunicationscore-github-token
          overrides: |
            AZURE_TOKEN=${{ secrets.AZURE_TOKEN }}

      - uses: actions/checkout@v7

      - name: Setup Skyline NuGet sources
        if: needs.check_oidc.outputs.is-skyline-managed == 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/setup-skyline-nuget-sources@main
        with:
          skylinecommunications-github-token: ${{ env.SKYLINECOMMUNICATIONS_GITHUB_TOKEN }}
          skylinecommunicationscore-github-token: ${{ env.SKYLINECOMMUNICATIONSCORE_GITHUB_TOKEN }}
          azure-token: ${{ env.AZURE_TOKEN }}

      - name: Setup local GitHub NuGet source
        if: needs.check_oidc.outputs.is-skyline-managed != 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/add-github-nuget-source@main
        with:
          organization: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dataminer-sbom
        if: github.ref_type == 'tag' && !contains(github.ref_name, '-')
        run: dotnet tool install Skyline.DataMiner.CICD.Tools.Sbom --global --version 1.*
        shell: bash

      - name: Build Debian packages
        id: package-debian
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/package-debian@main
        with:
          projects: ${{ inputs.dxm-projects-ubuntu }}
          version: ${{ needs.determine_version.outputs.version }}
          generate-sbom: ${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
          configuration: ${{ inputs.configuration }}
          output-directory: output

      - name: Upload Debian packages
        uses: actions/upload-artifact@v7
        with:
          name: debian-package
          path: output/*.deb

  # ════════════════════════════════════════════════════════════════
  # Windows packaging & signing: build all shippable artifacts and
  # sign everything in one place — DLL/EXE → WiX rebuild → MSI → NuGet → dmapp.
  # Runs on every ref except fork PRs (no secrets) and Dependabot, so packaging
  # problems surface before the release tag; the upload jobs below consume the
  # signed artifacts and remain tag-only.
  # (Windows required for NuGet signing: https://github.com/dotnet/runtime/issues/48794)
  # ════════════════════════════════════════════════════════════════

  package_windows:
    name: Package & Sign (Windows)
    runs-on: windows-latest
    if: needs.check_oidc.outputs.is-fork != 'true' && github.actor != 'dependabot[bot]'
    needs: [ci, check_oidc, discover_projects, determine_version]
    env:
      # Environment variable instead of -p:DefineConstants — a global property would
      # override the WiX projects' own DefineConstants (used for preprocessor variables
      # like ProductVersion=$(ProductVersion)) and break the MSI build. SDK-style C#
      # projects append to the environment value, so they still get the constants.
      DefineConstants: DCFv1;DBInfo;ALARM_SQUASHING
    outputs:
      has-nuget-packages: ${{ steps.detect-artifacts.outputs.has-nuget-packages }}
      has-dataminer-packages: ${{ steps.detect-artifacts.outputs.has-dataminer-packages }}
      has-msi: ${{ steps.detect-artifacts.outputs.has-msi }}
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: needs.check_oidc.outputs.use-oidc == 'true'
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Load secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}
          secret-names: |
            azure-token
            skylinecommunications-github-token
            skylinecommunicationscore-github-token
            signing-client-id
            signing-client-secret
            signing-tenant-id
            signing-key-vault-certificate
            signing-key-vault-url
            ${{ needs.discover_projects.outputs.has-dataminer-projects == 'true' && 'dataminer-token' || '' }}
          overrides: |
            AZURE_TOKEN=${{ secrets.AZURE_TOKEN }}
            DATAMINER_TOKEN=${{ secrets.DATAMINER_TOKEN }}

      - name: Enable long paths
        run: git config --global core.longpaths true
        shell: bash

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Skyline NuGet sources
        if: needs.check_oidc.outputs.is-skyline-managed == 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/setup-skyline-nuget-sources@main
        with:
          skylinecommunications-github-token: ${{ env.SKYLINECOMMUNICATIONS_GITHUB_TOKEN }}
          skylinecommunicationscore-github-token: ${{ env.SKYLINECOMMUNICATIONSCORE_GITHUB_TOKEN }}
          azure-token: ${{ env.AZURE_TOKEN }}

      - name: Setup local GitHub NuGet source
        if: needs.check_oidc.outputs.is-skyline-managed != 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/add-github-nuget-source@main
        with:
          organization: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install .NET tools
        env:
          HAS_DM_PROJECTS: ${{ needs.discover_projects.outputs.has-dataminer-projects }}
          HAS_WIX_PROJECTS: ${{ needs.discover_projects.outputs.has-wix-projects }}
        run: |
          dotnet tool install sign --global --prerelease

          if [[ "$HAS_DM_PROJECTS" == "true" || "$HAS_WIX_PROJECTS" == "true" ]]; then
            dotnet tool install Skyline.DataMiner.CICD.Tools.Sbom --global --version 1.*
          fi

          if [[ "$HAS_DM_PROJECTS" == "true" ]]; then
            dotnet tool install Skyline.DataMiner.CICD.Tools.NuGetChangeVersion --global --version 3.*
            dotnet tool install Skyline.DataMiner.CICD.Tools.PackageSign --global --version 2.*
          fi

          if [[ "$HAS_WIX_PROJECTS" == "true" ]]; then
            dotnet tool install Skyline.DataMiner.Utils.Tools.WiXFileInjector --global
          fi
        shell: bash

      - name: Update msbuild-sdks in global.json
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/update-global-json-sdks@main

      - name: Update Skyline.DataMiner.Core.AppPackageInstaller
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
        run: NuGetChangeVersion --solution-filepath "$SOLUTION_PATH" --nuget-name Skyline.DataMiner.Core.AppPackageInstaller --nuget-version $VERSION_APPPACKAGEINSTALLER
        shell: bash

      - name: Apply catalog identifiers
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/apply-catalog-identifiers@main
        with:
          mappings: ${{ inputs.override-catalog-identifiers }}

      - name: Apply source_code_url to manifest
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/apply-source-code-url@main
        with:
          repository: ${{ github.repository }}

      - name: Build all artifacts (packaging on, WiX included)
        env:
          OVERRIDE_CATALOG_DOWNLOAD_TOKEN: ${{ secrets.OVERRIDE_CATALOG_DOWNLOAD_TOKEN }}
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          VERSION: ${{ needs.determine_version.outputs.version }}
          NUMERIC_VERSION: ${{ needs.determine_version.outputs.numeric-version }}
          CONFIGURATION: ${{ inputs.configuration }}
          DEBUG_FLAG: ${{ inputs.debug }}
        run: |
          # NuGet/DataMiner packaging uses the full (suffix-bearing) version; assemblies and
          # the WiX MSI ProductVersion use the strict 4-field numeric version (WiX projects
          # reference it as $(ProductVersion) in <Package Version="...">).
          # DefineConstants comes from the job-level env var so the WiX projects can keep
          # their own preprocessor constants (a -p: global would clobber them).
          dotnet build "$SOLUTION_PATH" \
            -p:Version="$VERSION" \
            -p:PackageVersion="$VERSION" \
            -p:AssemblyVersion="$NUMERIC_VERSION" \
            -p:FileVersion="$NUMERIC_VERSION" \
            -p:ProductVersion="$NUMERIC_VERSION" \
            --configuration "$CONFIGURATION" \
            -p:CatalogPublishKeyName="DATAMINER_TOKEN" \
            -p:CatalogDefaultDownloadKeyName="OVERRIDE_CATALOG_DOWNLOAD_TOKEN" \
            -p:SkylineDataMinerSdkDebug="$DEBUG_FLAG" \
            -p:PackageOutputPath="${GITHUB_WORKSPACE}/_NuGetOutput"
        shell: bash

      - name: Create package name
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        id: packageName
        env:
          REPO: ${{ github.repository }}
        run: |
          $tempName = "$env:REPO"
          $safeName = $tempName -replace '[\"\/\\<>|:*?]', '_'
          echo "name=$safeName" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Add SBOM to DataMiner packages
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          PACKAGE_NAME: ${{ steps.packageName.outputs.name }}
          PACKAGE_VERSION: ${{ needs.determine_version.outputs.version }}
          DEBUG_FLAG: ${{ inputs.debug }}
        run: |
          find . -type f \( -name "*.dmapp" -o -name "*.dmtest" \) -print0 | while IFS= read -r -d '' file; do
            echo "Generating SBOM for $file"
            dataminer-sbom generate-and-add \
              --solution-path "$SOLUTION_PATH" \
              --package-file "$file" \
              --package-name "$PACKAGE_NAME" \
              --package-version "$PACKAGE_VERSION" \
              --package-supplier "Skyline Communications" \
              --debug "$DEBUG_FLAG"
          done
        shell: bash

      - name: Generate SBOM files for WiX installers
        if: needs.discover_projects.outputs.has-wix-projects == 'true' && github.ref_type == 'tag' && !contains(github.ref_name, '-')
        env:
          PACKAGE_VERSION: ${{ needs.determine_version.outputs.version }}
        run: |
          dataminer-sbom generate \
            --solution-path "$GITHUB_WORKSPACE" \
            --package-version "$PACKAGE_VERSION" \
            --package-supplier "Skyline Communications" \
            --output "$GITHUB_WORKSPACE/SBOM"
        shell: bash

      - name: Inject SBOM into WiX projects and rebuild
        if: needs.discover_projects.outputs.has-wix-projects == 'true' && github.ref_type == 'tag' && !contains(github.ref_name, '-')
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          VERSION: ${{ needs.determine_version.outputs.version }}
          NUMERIC_VERSION: ${{ needs.determine_version.outputs.numeric-version }}
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          $wixProjectDirs = dotnet sln "$env:SOLUTION_PATH" list | Select-String '\.wixproj' | ForEach-Object { Split-Path -Path $_.ToString().Trim() -Parent }
          foreach ($wixProjectDir in $wixProjectDirs) {
            add-file --WixProjDirectory "$wixProjectDir" --includeFilesDirectory "$env:GITHUB_WORKSPACE/SBOM"
          }
          # Rebuild so the MSI contains the SBOM.
          dotnet build "$env:SOLUTION_PATH" `
            -p:Version="$env:VERSION" `
            -p:PackageVersion="$env:VERSION" `
            -p:AssemblyVersion="$env:NUMERIC_VERSION" `
            -p:FileVersion="$env:NUMERIC_VERSION" `
            -p:ProductVersion="$env:NUMERIC_VERSION" `
            -p:GeneratePackageOnBuild=false `
            -p:GenerateDataMinerPackage=false `
            --configuration "$env:CONFIGURATION"
        shell: pwsh

      - name: Sign assemblies (before the MSI is rebuilt)
        if: needs.check_oidc.outputs.use-oidc == 'true' && needs.discover_projects.outputs.has-wix-projects == 'true'
        env:
          AZURE_TENANT_ID: ${{ env.SIGNING_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ env.SIGNING_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ env.SIGNING_CLIENT_SECRET }}
        run: |
          # In-place Authenticode signing (no --output) so the WiX rebuild below
          # bundles the signed binaries into the MSI. Two invocations on purpose:
          # brace patterns like *.{dll,exe} are NOT expanded (bash doesn't expand
          # braces inside quotes, and the sign tool's globber has no brace support).
          for pattern in "**/bin/**/*.dll" "**/bin/**/*.exe"; do
            sign code azure-key-vault "$pattern" \
              --publisher-name "Skyline Communications" \
              --description "Skyline Signing" \
              --description-url "https://www.skyline.be/" \
              --azure-key-vault-certificate "$SIGNING_KEY_VAULT_CERTIFICATE" \
              --azure-key-vault-url "$SIGNING_KEY_VAULT_URL"
          done
        shell: bash

      - name: Rebuild WiX projects with signed binaries
        if: needs.check_oidc.outputs.use-oidc == 'true' && needs.discover_projects.outputs.has-wix-projects == 'true'
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          VERSION: ${{ needs.determine_version.outputs.version }}
          NUMERIC_VERSION: ${{ needs.determine_version.outputs.numeric-version }}
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          # Rebuild ONLY the WiX projects so the MSI is built from the signed DLLs/EXEs.
          # BuildProjectReferences=false keeps the referenced projects from being
          # recompiled (which would overwrite the signatures).
          $solutionDir = Split-Path "$env:SOLUTION_PATH" -Parent
          $wixProjects = dotnet sln "$env:SOLUTION_PATH" list | Select-String '\.wixproj' | ForEach-Object { $_.ToString().Trim() }
          foreach ($wixProject in $wixProjects) {
            dotnet build (Join-Path $solutionDir ($wixProject -replace '\\', '/')) `
              -p:Version="$env:VERSION" `
              -p:ProductVersion="$env:NUMERIC_VERSION" `
              -p:BuildProjectReferences=false `
              --configuration "$env:CONFIGURATION"
          }
        shell: pwsh

      - name: Sign installers
        if: needs.check_oidc.outputs.use-oidc == 'true' && needs.discover_projects.outputs.has-wix-projects == 'true'
        env:
          AZURE_TENANT_ID: ${{ env.SIGNING_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ env.SIGNING_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ env.SIGNING_CLIENT_SECRET }}
        run: |
          sign code azure-key-vault "**/bin/**/*.msi" \
            --publisher-name "Skyline Communications" \
            --description "Skyline Signing" \
            --description-url "https://www.skyline.be/" \
            --azure-key-vault-certificate "$SIGNING_KEY_VAULT_CERTIFICATE" \
            --azure-key-vault-url "$SIGNING_KEY_VAULT_URL" \
            --output "_SignedInstallers"
        shell: bash

      - name: Sign NuGet packages
        if: needs.check_oidc.outputs.use-oidc == 'true'
        env:
          AZURE_TENANT_ID: ${{ env.SIGNING_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ env.SIGNING_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ env.SIGNING_CLIENT_SECRET }}
        run: |
          if compgen -G "_NuGetOutput/*.nupkg" > /dev/null; then
            sign code azure-key-vault "_NuGetOutput/**/*.nupkg" \
              --publisher-name "Skyline Communications" \
              --description "Skyline Signing" \
              --description-url "https://www.skyline.be/" \
              --azure-key-vault-certificate "$SIGNING_KEY_VAULT_CERTIFICATE" \
              --azure-key-vault-url "$SIGNING_KEY_VAULT_URL" \
              --output "_SignedNuGetResults"
          else
            echo "No NuGet packages to sign."
          fi
        shell: bash

      - name: Sign DataMiner packages
        if: needs.check_oidc.outputs.use-oidc == 'true' && needs.discover_projects.outputs.has-dataminer-projects == 'true'
        env:
          AZURE_TENANT_ID: ${{ env.SIGNING_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ env.SIGNING_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ env.SIGNING_CLIENT_SECRET }}
          AZURE_KEY_VAULT_URL: ${{ env.SIGNING_KEY_VAULT_URL }}
          AZURE_KEY_VAULT_CERTIFICATE: ${{ env.SIGNING_KEY_VAULT_CERTIFICATE }}
          DEBUG_FLAG: ${{ inputs.debug }}
        run: |
          dataminer-package-signature sign dmapp `
            --package-location "$env:GITHUB_WORKSPACE" `
            --debug $env:DEBUG_FLAG
        shell: pwsh

      - name: Fall back to unsigned artifacts (signing not available)
        if: needs.check_oidc.outputs.use-oidc != 'true'
        run: |
          echo "::warning::OIDC is not available - artifacts are packaged UNSIGNED."
          if compgen -G "_NuGetOutput/*.nupkg" > /dev/null; then
            mkdir -p _SignedNuGetResults
            cp _NuGetOutput/*.nupkg _SignedNuGetResults/
          fi
          mkdir -p _SignedInstallers
          find . -type f -name '*.msi' -path '*/bin/*' -not -path './_SignedInstallers/*' -exec cp {} _SignedInstallers/ \;
        shell: bash

      - name: Detect produced artifacts
        id: detect-artifacts
        run: |
          # NOTE: this step runs under `bash -e -o pipefail`; `find` on a missing
          # directory exits non-zero and would abort the script, so guard each
          # directory with -d instead of relying on 2>/dev/null.
          nuget_count=0
          if [ -d "_SignedNuGetResults" ]; then
            nuget_count=$(find _SignedNuGetResults -name '*.nupkg' | wc -l)
          fi
          msi_count=0
          if [ -d "_SignedInstallers" ]; then
            msi_count=$(find _SignedInstallers -name '*.msi' | wc -l)
          fi
          dm_count=$(find . -type f \( -name '*.dmapp' -o -name '*.dmtest' \) -path '*/bin/*' | wc -l)
          echo "Found $nuget_count NuGet package(s), $dm_count DataMiner package(s), $msi_count MSI installer(s)."
          echo "has-nuget-packages=$([ "$nuget_count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has-dataminer-packages=$([ "$dm_count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has-msi=$([ "$msi_count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload signed NuGet packages
        if: steps.detect-artifacts.outputs.has-nuget-packages == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: SignedNugetPackages
          path: _SignedNuGetResults

      - name: Upload signed DataMiner packages
        if: steps.detect-artifacts.outputs.has-dataminer-packages == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: SignedDataMinerPackages
          path: |
            **/bin/${{ inputs.configuration }}/*.dmapp
            **/bin/${{ inputs.configuration }}/*.dmtest
            **/bin/${{ inputs.configuration }}/*.zip
            **/bin/${{ inputs.configuration }}/**/*.dmapp
            **/bin/${{ inputs.configuration }}/**/*.dmtest
            **/bin/${{ inputs.configuration }}/**/*.zip

      - name: Upload signed installers
        if: steps.detect-artifacts.outputs.has-msi == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: SignedInstallers
          path: _SignedInstallers

  # ════════════════════════════════════════════════════════════════
  # NuGet Push (on tag only)
  # ════════════════════════════════════════════════════════════════

  push_nuget:
    name: Push NuGet Packages
    if: github.ref_type == 'tag' && needs.package_windows.outputs.has-nuget-packages == 'true'
    runs-on: ubuntu-latest
    needs: [package_windows, check_oidc]
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: needs.check_oidc.outputs.use-oidc == 'true'
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Load NuGet push secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}
          secret-names: |
            nuget-api-key-github
          overrides: |
            NUGET_API_KEY_GITHUB=${{ secrets.NUGET_API_KEY }}

      - name: Download Signed NuGet
        uses: actions/download-artifact@v8
        with:
          name: SignedNugetPackages
          path: _SignedNuGetResults

      - name: Find NuGet packages
        id: findcreatednuget
        run: |
          {
            echo "nugetPackageName<<EOF"
            find _SignedNuGetResults -type f -name '*.nupkg'
            echo "EOF"
          } >> $GITHUB_OUTPUT
        shell: bash

      - name: Push NuGet packages
        env:
          PUSH_SOURCE_INPUT: ${{ inputs.nuget-push-source }}
          REPO_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAMES: ${{ steps.findcreatednuget.outputs.nugetPackageName }}
        run: |
          # Determine push source
          PUSH_SOURCE="$PUSH_SOURCE_INPUT"
          if [ -z "$PUSH_SOURCE" ]; then
            PUSH_SOURCE="https://nuget.pkg.github.com/$REPO_OWNER/index.json"
          fi

          # Determine API key: use OIDC/user-provided key, else fall back to GITHUB_TOKEN
          API_KEY="$NUGET_API_KEY_GITHUB"
          if [ -z "$API_KEY" ]; then
            API_KEY="$GH_TOKEN"
          fi

          IFS=$'\n'
          for i in $PACKAGE_NAMES;
          do
              dotnet nuget push "$i" --api-key "$API_KEY" --source "$PUSH_SOURCE"
          done
          unset IFS
        shell: bash

  # ════════════════════════════════════════════════════════════════
  # DataMiner Catalog Upload (on tag only)
  # ════════════════════════════════════════════════════════════════

  upload_to_catalog:
    name: Upload to Catalog
    runs-on: windows-latest
    if: github.ref_type == 'tag' && needs.discover_projects.outputs.has-dataminer-projects == 'true' && needs.package_windows.outputs.has-dataminer-packages == 'true'
    needs: [package_windows, check_oidc, discover_projects]
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: needs.check_oidc.outputs.use-oidc == 'true'
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Load catalog upload secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}
          secret-names: |
            dataminer-token
          overrides: |
            DATAMINER_TOKEN=${{ secrets.DATAMINER_TOKEN }}

      - name: Enable long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download signed artifacts
        uses: actions/download-artifact@v8
        with:
          name: SignedDataMinerPackages
          path: downloaded_artifacts

      - name: Restore artifact contents to bin folders
        run: |
          Write-Output "Restoring DataMiner package files to original structure..."

          $downloadRoot = Resolve-Path "downloaded_artifacts"
          $workspaceRoot = Resolve-Path "."

          Get-ChildItem -Path $downloadRoot -Recurse -File | Where-Object { $_.Extension -in '.zip', '.dmapp', '.dmtest' } | ForEach-Object {
              $archiveFile = $_.FullName
              $relativePath = $archiveFile.Substring($downloadRoot.Path.Length + 1) -replace '\\', '/'
              $targetPath = Join-Path $workspaceRoot $relativePath

              $targetFolder = Split-Path $targetPath
              if (-not (Test-Path $targetFolder)) {
                  New-Item -ItemType Directory -Path $targetFolder -Force | Out-Null
              }

              Move-Item -Path $archiveFile -Destination $targetPath -Force
              Write-Output "Moved $relativePath to workspace root"
          }

          Write-Output "Removing downloaded_artifacts folder..."
          Remove-Item -Path $downloadRoot -Recurse -Force
          Write-Output "Cleanup complete."
        shell: pwsh

      - name: Find Version Comment
        id: findVersionComment
        env:
          REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking for release notes associated with the reference: '$REF_NAME'"

          RELEASE_INFO=$(gh release view "$REF_NAME" --json body,name 2>/dev/null || echo "{}")
          RELEASE_NOTE=$(echo "$RELEASE_INFO" | jq -r '.body // ""' 2>/dev/null || echo "")
          RELEASE_TITLE=$(echo "$RELEASE_INFO" | jq -r '.name // ""' 2>/dev/null || echo "")

          escape_special_chars() {
            echo "$1" | sed -e 's/,/%2c/g' -e 's/"/%22/g' -e 's/;/%3b/g'
          }

          if [[ -n "$RELEASE_NOTE" ]]; then
            ESCAPED_RELEASE_NOTE=$(escape_special_chars "$RELEASE_NOTE")
            echo "Release description found for '$REF_NAME': $ESCAPED_RELEASE_NOTE"
            echo "versionComment<<EOF" >> $GITHUB_OUTPUT
            echo "$ESCAPED_RELEASE_NOTE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          elif [[ -n "$RELEASE_TITLE" ]]; then
            ESCAPED_RELEASE_TITLE=$(escape_special_chars "$RELEASE_TITLE")
            echo "Release title found for '$REF_NAME': $ESCAPED_RELEASE_TITLE"
            echo "versionComment=$ESCAPED_RELEASE_TITLE" >> $GITHUB_OUTPUT
          else
            echo "No release description or title found for '$REF_NAME'. Falling back to tag or commit message."
            VERSION_COMMENT=$(git describe --tags --exact-match 2>/dev/null || git log -1 --pretty=format:%s)
            ESCAPED_VERSION_COMMENT=$(escape_special_chars "$VERSION_COMMENT")
            echo "Fallback version comment: $ESCAPED_VERSION_COMMENT"
            echo "versionComment=$ESCAPED_VERSION_COMMENT" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Update msbuild-sdks in global.json
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/update-global-json-sdks@main

      - name: Publish To Catalog
        shell: pwsh
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          VERSION: ${{ github.ref_name }}
          VERSION_COMMENT: ${{ steps.findVersionComment.outputs.versionComment }}
          CONFIGURATION: ${{ inputs.configuration }}
          DEBUG_FLAG: ${{ inputs.debug }}
        run: |
          dotnet publish `
            "$env:SOLUTION_PATH" `
            --no-build `
            -p:Version="$env:VERSION" `
            -p:VersionComment="$env:VERSION_COMMENT" `
            -p:CatalogPublishKeyName="DATAMINER_TOKEN" `
            --configuration "$env:CONFIGURATION" `
            -p:SkylineDataMinerSdkDebug="$env:DEBUG_FLAG" `
            -p:IsPublishable=false
